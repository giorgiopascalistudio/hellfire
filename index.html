<!DOCTYPE html>
<html lang="it" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>HELL-FIRE V2 — Home</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: '#0f1012',
            primary: '#ff6b00',
            success: '#38d27a',
            danger: '#ff3b30',
            textMain: '#e6e8eb',
            textMuted: '#8f98a3'
          },
          fontFamily: {
            display: ['Space Grotesk', 'sans-serif'],
            body: ['Inter', 'sans-serif']
          },
          keyframes: {
            blinkAmber: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '.4' }
            }
          },
          animation: {
            blinkAmber: 'blinkAmber 1.2s ease-in-out infinite'
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      min-height: 100dvh;
      overflow: hidden;
      background: #0f1012;
      color: #e6e8eb;
      font-family: 'Inter', sans-serif;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24;
    }
    .panel {
      background: linear-gradient(180deg, rgba(20,22,26,.22), rgba(12,13,16,.18));
      border: 1px solid rgba(255,255,255,.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .scanline-overlay {
      background:
        linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.20) 50%),
        linear-gradient(90deg, rgba(255,0,0,0.02), rgba(0,255,0,0.01), rgba(255,107,0,0.03));
      background-size: 100% 3px, 4px 100%;
      pointer-events: none;
    }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 999px;
      display: inline-block;
    }
    .switch-pill.active {
      background: rgba(255,107,0,.95);
      color: #111;
      box-shadow: 0 0 14px rgba(255,107,0,.25);
    }
    .mode-card {
      background: linear-gradient(180deg, rgba(20,22,26,.22), rgba(12,13,16,.18));
      border: 1px solid rgba(255,255,255,.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: border-color 0.15s, transform 0.1s;
    }
    .mode-card:active { transform: scale(0.97); border-color: rgba(255,107,0,.4); }
    .sys-bar {
      background: linear-gradient(180deg, rgba(20,22,26,.22), rgba(12,13,16,.18));
      border: 1px solid rgba(255,255,255,.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
  </style>
</head>
<body class="bg-background text-textMain">
  <div class="relative h-screen w-screen overflow-hidden bg-background">

    <!-- SFONDO TATTICO -->
    <div class="absolute inset-0">
      <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_60%_20%,rgba(255,107,0,0.06)_0%,transparent_60%)]"></div>
      <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_20%_80%,rgba(255,59,48,0.04)_0%,transparent_50%)]"></div>
      <div class="scanline-overlay absolute inset-0"></div>
    </div>

    <!-- HEADER -->
    <header class="fixed inset-x-0 top-0 z-50 h-20 border-b border-white/10 bg-[#0d0e10]/45 px-6 backdrop-blur-md">
      <div class="flex h-full items-center justify-between gap-4">
        <div class="flex items-center gap-3">
          <div class="flex h-11 w-11 items-center justify-center rounded-2xl border border-primary/30 bg-primary/10 text-primary">
            <span class="material-symbols-outlined">target</span>
          </div>
          <div>
            <div class="font-display text-[22px] font-extrabold uppercase tracking-[0.14em] text-primary">HELL-FIRE</div>
            <div class="font-display text-[10px] uppercase tracking-[0.28em] text-textMuted">TURRET CONTROL SYSTEM · V2.0</div>
          </div>
        </div>

        <div class="flex items-center gap-3">
          <div class="panel rounded-2xl px-4 py-2">
            <div class="font-display text-[10px] uppercase tracking-[0.22em] text-textMuted">Sistema</div>
            <div class="mt-1 flex items-center gap-2 font-display text-[12px] font-bold uppercase tracking-[0.16em] text-success">
              <span class="status-dot bg-success" id="sys-dot"></span>
              <span id="sys-label">—</span>
            </div>
          </div>
          <div class="panel rounded-2xl px-4 py-2">
            <div class="font-display text-[10px] uppercase tracking-[0.22em] text-textMuted">Hardware</div>
            <div class="mt-1 flex items-center gap-2 font-display text-[12px] font-bold uppercase tracking-[0.16em]" id="hw-inner">
              <span class="status-dot bg-textMuted" id="hw-dot"></span>
              <span id="hw-label">—</span>
            </div>
          </div>
          <div class="panel rounded-2xl px-4 py-2">
            <div class="font-display text-[10px] uppercase tracking-[0.22em] text-textMuted">Uptime</div>
            <div class="mt-1 font-display text-[12px] font-bold uppercase tracking-[0.16em] text-textMain" id="uptime-val">—</div>
          </div>
        </div>
      </div>
    </header>

    <!-- MAIN -->
    <main class="relative h-full w-full pt-20 flex flex-col items-center justify-center gap-8 px-6">

      <!-- MODE CARDS -->
      <div class="grid grid-cols-2 gap-4 w-full max-w-[560px]">
        <a href="/manual" class="mode-card rounded-[28px] p-6 text-center no-underline">
          <div class="mb-3 flex justify-center">
            <div class="flex h-14 w-14 items-center justify-center rounded-2xl border border-primary/30 bg-primary/10 text-primary">
              <span class="material-symbols-outlined" style="font-size:28px">sports_esports</span>
            </div>
          </div>
          <div class="font-display text-[15px] font-extrabold uppercase tracking-[0.2em] text-primary mb-2">MANUAL</div>
          <div class="font-display text-[10px] uppercase tracking-[0.14em] text-textMuted leading-relaxed">Joystick + Live Cam<br>+ Fire Control</div>
        </a>
        <a href="/auto" class="mode-card rounded-[28px] p-6 text-center no-underline">
          <div class="mb-3 flex justify-center">
            <div class="flex h-14 w-14 items-center justify-center rounded-2xl border border-primary/30 bg-primary/10 text-primary">
              <span class="material-symbols-outlined" style="font-size:28px">robot_2</span>
            </div>
          </div>
          <div class="font-display text-[15px] font-extrabold uppercase tracking-[0.2em] text-primary mb-2">AUTO</div>
          <div class="font-display text-[10px] uppercase tracking-[0.14em] text-textMuted leading-relaxed">AI Tracking + IFF<br>YOLO / COCO-SSD</div>
        </a>
      </div>

      <!-- SYSTEM STATUS BAR -->
      <div class="sys-bar rounded-2xl px-5 py-3 flex items-center gap-5 w-full max-w-[560px]">
        <div class="flex flex-col items-center gap-1 border-r border-white/10 pr-5">
          <span class="font-display text-[9px] uppercase tracking-[0.2em] text-textMuted">HW</span>
          <span class="font-display text-[14px] font-bold text-primary" id="s-hw">—</span>
        </div>
        <div class="flex flex-col items-center gap-1 border-r border-white/10 pr-5">
          <span class="font-display text-[9px] uppercase tracking-[0.2em] text-textMuted">CAM</span>
          <span class="font-display text-[14px] font-bold text-primary" id="s-cam">—</span>
        </div>
        <div class="flex flex-col items-center gap-1 border-r border-white/10 pr-5">
          <span class="font-display text-[9px] uppercase tracking-[0.2em] text-textMuted">PAN</span>
          <span class="font-display text-[14px] font-bold text-primary" id="s-pan">—</span>
        </div>
        <div class="flex flex-col items-center gap-1 border-r border-white/10 pr-5">
          <span class="font-display text-[9px] uppercase tracking-[0.2em] text-textMuted">TILT</span>
          <span class="font-display text-[14px] font-bold text-primary" id="s-tilt">—</span>
        </div>
        <div class="flex flex-col items-center gap-1 border-r border-white/10 pr-5">
          <span class="font-display text-[9px] uppercase tracking-[0.2em] text-textMuted">BB</span>
          <span class="font-display text-[14px] font-bold text-textMain" id="s-bb">—</span>
        </div>
        <div class="flex flex-col items-center gap-1 border-r border-white/10 pr-5">
          <span class="font-display text-[9px] uppercase tracking-[0.2em] text-textMuted">MODE</span>
          <span class="font-display text-[14px] font-bold text-textMuted" id="s-mode">—</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <span class="font-display text-[9px] uppercase tracking-[0.2em] text-textMuted">STATUS</span>
          <span class="font-display text-[14px] font-bold text-success" id="s-status">—</span>
        </div>
      </div>

    </main>
  </div>

  <script src="/static/common.js"></script>
  <script>
    async function loadStatus() {
      try {
        const s = await API.status();
        const hw = s.hardware;
        document.getElementById('s-hw').textContent = hw ? 'OK' : 'SIM';
        document.getElementById('s-hw').className = hw ? 'font-display text-[14px] font-bold text-success' : 'font-display text-[14px] font-bold text-amber-400';
        document.getElementById('s-cam').textContent = s.camera ? 'OK' : 'OFF';
        document.getElementById('s-cam').className = s.camera ? 'font-display text-[14px] font-bold text-success' : 'font-display text-[14px] font-bold text-amber-400';
        document.getElementById('s-pan').textContent = s.pan_deg.toFixed(1) + '°';
        document.getElementById('s-tilt').textContent = s.tilt_deg.toFixed(1) + '°';
        document.getElementById('s-bb').textContent = s.fire_total_bb;
        document.getElementById('s-mode').textContent = s.mode.toUpperCase();
        const armed = s.armed, emg = s.emergency;
        const stEl = document.getElementById('s-status');
        stEl.textContent = emg ? 'E-STOP' : (armed ? 'ARMED' : 'SAFE');
        stEl.className = (emg || armed) ? 'font-display text-[14px] font-bold text-danger' : 'font-display text-[14px] font-bold text-success';

        document.getElementById('sys-dot').className = 'status-dot bg-success';
        document.getElementById('sys-label').textContent = 'Online';
        document.getElementById('hw-dot').className = hw ? 'status-dot bg-success' : 'status-dot bg-amber-400';
        document.getElementById('hw-label').textContent = hw ? 'HW OK' : 'SIM';
        document.getElementById('hw-inner').className = hw ? 'mt-1 flex items-center gap-2 font-display text-[12px] font-bold uppercase tracking-[0.16em] text-success' : 'mt-1 flex items-center gap-2 font-display text-[12px] font-bold uppercase tracking-[0.16em] text-amber-400';
        document.getElementById('uptime-val').textContent = formatUptime(s.uptime);
      } catch(e) {
        document.getElementById('sys-dot').className = 'status-dot bg-danger';
        document.getElementById('sys-label').textContent = 'Offline';
      }
    }
    loadStatus();
    setInterval(loadStatus, 1500);
  </script>
<script>
(function(){
  var lastTap=0;
  document.addEventListener("touchend",function(e){var now=Date.now();if(now-lastTap<350){e.preventDefault();}lastTap=now;},{passive:false});
  document.addEventListener("touchmove",function(e){if(e.touches.length>1){e.preventDefault();}},{passive:false});
  document.addEventListener("gesturestart",function(e){e.preventDefault();},{passive:false});
})();
</script>
</body>
</html>
